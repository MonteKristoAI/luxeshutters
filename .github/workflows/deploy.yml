name: Build, Prerender & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SITE_URL: https://luxeshutters.com.au

      - name: Install Puppeteer browser
        run: npx puppeteer browsers install chrome

      - name: Prerender routes
        run: node scripts/prerender.mjs

      - name: Verify prerendered content
        run: |
          echo "Homepage size:" && wc -c dist/index.html
          echo "Services size:" && wc -c dist/services/index.html
          echo "Gallery size:" && wc -c dist/gallery/index.html
          echo "Checking for real content..."
          grep -c "Luxe Shutters" dist/index.html
          grep -c "application/ld+json" dist/index.html

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=luxeshutters
